name: .NET Desktop Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: EarthBackground.sln
      Project_Path: src\EarthBackground.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: dotnet build $env:Solution_Name --configuration ${{ matrix.configuration }} --no-restore

    # Execute unit tests if they exist
    - name: Test
      run: dotnet test $env:Solution_Name --configuration ${{ matrix.configuration }} --no-build --verbosity normal
      continue-on-error: true

    # Publish the application
    - name: Publish
      if: matrix.configuration == 'Release'
      run: |
        dotnet publish $env:Project_Path `
          --configuration Release `
          --output publish `
          --self-contained false `
          -p:PublishReadyToRun=true `
          -p:PublishSingleFile=false

    # Create a zip archive of the published application
    - name: Create Release Archive
      if: matrix.configuration == 'Release'
      run: |
        Compress-Archive -Path publish\* -DestinationPath EarthBackground-${{ github.ref_name }}.zip

    # Upload build artifacts
    - name: Upload Build Artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: EarthBackground-Release-${{ github.sha }}
        path: publish\

    # Upload release archive
    - name: Upload Release Archive
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: EarthBackground-Archive
        path: EarthBackground-*.zip

    # Attach to GitHub Release if this is a release event
    - name: Attach to Release
      if: github.event_name == 'release' && matrix.configuration == 'Release'
      uses: softprops/action-gh-release@v1
      with:
        files: EarthBackground-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
